<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View the latest release notes for Google BigQuery.">
    <title>BigQuery Release Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>BigQuery <span class="highlight">Release Notes</span></h1>
                <p>Stay updated with the latest features, fixes, and announcements.</p>
            </div>
            <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                <button id="theme-toggle-btn" class="btn" style="background: var(--bg-card); border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1)); color: var(--text-main); padding: 0.5rem; border-radius: 50%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;" aria-label="Toggle Theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <button id="export-csv-btn" class="btn" style="background: var(--bg-card); border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1)); color: var(--text-main);">
                    <span class="btn-text">Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn primary-btn">
                    <span class="btn-text">Refresh</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </header>
        
        <main id="notes-container">
            <!-- Notes will be injected here -->
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
