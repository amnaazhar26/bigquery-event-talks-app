<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View the latest release notes for Google BigQuery.">
    <title>BigQuery Release Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>BigQuery <span class="highlight">Release Notes</span></h1>
                <p>Stay updated with the latest features, fixes, and announcements.</p>
            </div>
            <button id="refresh-btn" class="btn primary-btn">
                <span class="btn-text">Refresh</span>
                <div class="spinner"></div>
            </button>
        </header>
        
        <main id="notes-container">
            <!-- Notes will be injected here -->
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
